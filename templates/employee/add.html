{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold mb-0 text-primary"><i class="fa-solid fa-user-plus me-2"></i> Onboard New Employee</h4>
            <a href="{% url 'employee_list' %}" class="btn btn-outline-secondary"><i
                    class="fa-solid fa-arrow-left me-1"></i> Back to Directory</a>
        </div>

        <div class="dashboard-card p-4">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-bold">Full Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-muted fw-bold">Role</label>
                        <select name="role" class="form-select" required>
                            <option value="employee">Employee</option>
                            <option value="hr">HR Manager</option>
                        </select>
                    </div>

                    <div class="col-md-6 mt-4">
                        <label class="form-label text-muted fw-bold">Username</label>
                        <input type="text" name="username" class="form-control" required placeholder="johndoe123">
                    </div>
                    <div class="col-md-6 mt-4">
                        <label class="form-label text-muted fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="••••••••">
                    </div>

                    <div class="col-md-6 mt-4">
                        <label class="form-label text-muted fw-bold">Department</label>
                        <select name="department" class="form-select" required>
                            <option value="">Select Department...</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="Human Resources">Human Resources</option>
                            <option value="Finance">Finance</option>
                        </select>
                    </div>
                    <div class="col-md-6 mt-4">
                        <label class="form-label text-muted fw-bold">Designation</label>
                        <input type="text" name="designation" class="form-control" required
                            placeholder="e.g. Senior Developer">
                    </div>

                    <div class="col-md-12 mt-4">
                        <label class="form-label text-muted fw-bold">Profile Picture (For Facial Recognition)</label>
                        <input type="file" name="profile_pic" class="form-control" accept="image/*">
                        <div class="form-text">Choose a clear photo for face authentication.</div>
                    </div>

                    <div class="col-md-12 mt-4">
                        <label class="form-label text-muted fw-bold">Joining Date</label>
                        <input type="date" name="joining_date" class="form-control" required>
                    </div>

                    <div class="col-md-12 mt-5 text-end">
                        <button type="submit" class="btn btn-custom px-5"><i class="fa-solid fa-save me-2"></i> Register Employee</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<style>
    body.login-body {
        background: url('/static/images/login_background.png') no-repeat center center fixed;
        background-size: cover;
        position: relative;
    }
    body.login-body::before {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.7); /* Dark overlay for readability */
        z-index: -1;
    }
    .login-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .logo-container img {
        width: 120px;
        height: auto;
        margin-bottom: 20px;
    }
</style>

<div class="row justify-content-center align-items-center" style="min-height: 80vh;">

    <div style="position: fixed; top: 20px; left: 20px; z-index: 1050;">
    <a href="{% url 'home' %}" class="btn btn-light shadow-sm rounded-pill px-3 py-2">
        <i class="fa-solid fa-arrow-left me-2"></i> Home
    </a>
</div>
    <div class="col-md-5">
        <div class="login-card p-5 text-center fade-in">
            <div class="logo-container">
                <img src="/static/images/smart_employee_logo.png" alt="Smart Employee AI Logo">
            </div>
            <h2 class="mb-2 fw-bold text-dark">Welcome Back</h2>
            <p class="text-muted mb-4">Please enter your credentials to access your workspace</p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4 text-start">
                    <label class="form-label text-muted fw-bold small uppercase">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-user text-primary"></i></span>
                        <input type="text" name="username" class="form-control border-start-0 py-3" required placeholder="example_id">
                    </div>
                </div>
                



            <div class="mb-4 text-start">
    <label class="form-label text-muted fw-bold small uppercase">Password</label>
    
    <div class="input-group">
        <!-- Lock icon -->
        <span class="input-group-text bg-white border-end-0">
            <i class="fa-solid fa-lock text-primary"></i>
        </span>

        <!-- Password input -->
        <input type="password" id="passwordField" name="password"
               class="form-control border-start-0 border-end-0 py-3"
               required placeholder="••••••••">

        <!-- Eye icon -->
        <span class="input-group-text bg-white border-start-0" style="cursor: pointer;" onclick="togglePassword()">
            <i id="toggleIcon" class="fa-solid fa-eye"></i>
        </span>
    </div>
</div>






                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-custom btn-lg py-3">Login to Dashboard <i class="fa-solid fa-arrow-right ms-2"></i></button>
                </div>
            </form>
            
            <div class="mt-4 border-top pt-4">
                <p class="text-muted small mb-0">Don't have an account?</p>
                <a href="{% url 'register' %}" class="fw-bold text-primary text-decoration-none">Register as Employee</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.body.classList.add('login-body');


    function togglePassword() {
    const passwordField = document.getElementById("passwordField");
    const icon = document.getElementById("toggleIcon");

    if (passwordField.type === "password") {
        passwordField.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        passwordField.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}



</script>
{% endblock %}
